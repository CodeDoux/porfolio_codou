<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Codou Sarr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 8%;
            position: relative;
            z-index: 2;
        }

        .contact::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: translateX(-50%) scale(1); 
                opacity: 0.6; 
            }
            50% { 
                transform: translateX(-50%) scale(1.2); 
                opacity: 0.9; 
            }
        }

        .contact h2 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff8c00 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: fadeInDown 1s ease-out;
            position: relative;
        }

        .contact h2::after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #ff8c00, #ffd700);
            margin: 1.5rem auto 3rem;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            padding: 2.5rem 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 140, 0, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .contact-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, #ff8c00, #ffd700);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .contact-item:hover::before {
            opacity: 1;
        }

        .contact-item::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .contact-item:hover::after {
            width: 400px;
            height: 400px;
        }

        .contact-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.4);
            border-color: rgba(255, 140, 0, 0.4);
        }

        .contact-item:nth-child(1) { animation-delay: 0.4s; }
        .contact-item:nth-child(2) { animation-delay: 0.5s; }
        .contact-item:nth-child(3) { animation-delay: 0.6s; }

        .contact-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .contact-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #ff8c00, #ffd700);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .contact-item a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .contact-item a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff8c00, #ffd700);
            transition: width 0.4s ease;
        }

        .contact-item a:hover::after {
            width: 100%;
        }

        .contact-item a:hover {
            background: linear-gradient(135deg, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: translateX(5px);
        }

        .icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.2), rgba(255, 215, 0, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .contact-item:hover .icon-wrapper {
            transform: rotate(360deg) scale(1.1);
            background: linear-gradient(135deg, #ff8c00, #ffd700);
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.6);
        }

        .floating-elements {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        .float-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 140, 0, 0.15);
        }

        .circle-1 {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 5%;
            animation: float 8s ease-in-out infinite;
        }

        .circle-2 {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 5%;
            animation: float 10s ease-in-out infinite reverse;
        }

        .circle-3 {
            width: 80px;
            height: 80px;
            top: 50%;
            right: 10%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .contact {
                padding: 60px 5%;
            }

            .contact h2 {
                font-size: 2.5rem;
            }

            .contact-item {
                padding: 2rem 1.5rem;
            }

            .contact-label {
                font-size: 1rem;
            }

            .contact-item a {
                font-size: 1.1rem;
                word-break: break-word;
            }

            .icon-wrapper {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="float-circle circle-1"></div>
        <div class="float-circle circle-2"></div>
        <div class="float-circle circle-3"></div>
    </div>

    <section class="contact">
        <h2>Contactez-moi</h2>
        
        <div class="contact-info">
            <div class="contact-item">
                <div class="icon-wrapper">📧</div>
                <div class="contact-label">Email</div>
                <a href="mailto:sarrcodou98&#64;gmail.com">sarrcodou98&#64;gmail.com</a>
            </div>

            <div class="contact-item">
                <div class="icon-wrapper">💼</div>
                <div class="contact-label">LinkedIn</div>
                <a href="https://linkedin.com/in/codousarr" target="_blank">linkedin.com/in/CodouSarr</a>
            </div>

            <div class="contact-item">
                <div class="icon-wrapper">💻</div>
                <div class="contact-label">GitHub</div>
                <a href="https://github.com/codousarr" target="_blank">github.com/codousarr</a>
            </div>
        </div>
    </section>
</body>
</html>
