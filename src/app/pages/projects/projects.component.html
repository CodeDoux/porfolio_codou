
<!-- projets.component.html -->
<section class="projects">
    <div class="floating-shapes shape-1"></div>
    <div class="floating-shapes shape-2"></div>

    <h2>Mes Projets</h2>
    <p class="projects-intro">
        Voici une sélection de mes projets récents. D'autres réalisations sont disponibles sur mon
        <a href="https://github.com/codousarr" target="_blank" class="intro-link">GitHub</a>.
    </p>

    <div class="project-list">
        <div class="project-card" *ngFor="let p of projects">
            <img [src]="p.image" [alt]="p.title">

            <div class="project-body">
                <h3>{{ p.title }}</h3>
                <p>{{ p.description }}</p>

                <div class="tech-tags">
                    <span class="tag" *ngFor="let tech of p.technologies">✅ {{ tech }}</span>
                </div>

                <div class="project-links">
                    <a [href]="p.demoLink" target="_blank" class="btn-link demo">🔗 Démo</a>
                    <a *ngIf="p.githubLink" [href]="p.githubLink" target="_blank" class="btn-link github">🔗 GitHub</a>
                </div>
            </div>
        </div>
    </div>
</section>
